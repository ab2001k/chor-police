<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chor Police Multiplayer</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231E293B%22/><text x=%2250%22 y=%2254%22 font-family=%22Arial%22 font-size=%2250%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>CP</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #0F172A;        
            --bg-app: #FFFFFF;         
            --primary: #3B82F6;        
            --primary-hover: #2563EB;
            --accent: #E11D48;         
            --accent-hover: #BE123C;
            --text-main: #1E293B;
            --text-light: #64748B;
            --surface: #F8FAFC;        
            --border-color: #E2E8F0;
            --card-back: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background: var(--bg-app);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 500px) {
            #game-container {
                height: 95vh;
                border-radius: 24px;
            }
        }

        header {
            background: var(--bg-app);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }

        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.97); }
        
        button.danger { background: var(--accent); }
        button.danger:hover { background: var(--accent-hover); }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
        }
        .btn-outline:hover { background: var(--surface); }

        .screen { 
            display: none; 
            padding: 24px; 
            flex-grow: 1; 
            flex-direction: column; 
            overflow-y: auto; 
        }
        .screen.active { display: flex; }

        h2, h3 { margin-top: 0; color: var(--text-main); }
        p { color: var(--text-light); }
        
        input, select {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            transition: border-color 0.2s;
            background: var(--bg-app);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .card-panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* Room Info Bar */
        #room-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: var(--text-main);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        #room-info p { margin: 0; color: white; font-weight: 500; font-size: 1rem;}
        #room-info strong { letter-spacing: 1px; color: #38BDF8; font-size: 1.2rem; }
        .room-actions { display: flex; gap: 8px; width: 100%; justify-content: center;}

        /* Card Table */
        #card-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 10px 0 20px 0;
            perspective: 1000px;
        }
        #card-table.six-players { grid-template-columns: 1fr 1fr 1fr; }

        .card {
            background: var(--card-back);
            height: 110px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .card:hover:not(.flipped) {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .card.flipped {
            background: white;
            color: var(--text-main);
            border: 2px solid var(--primary);
            transform: rotateY(180deg);
            cursor: default;
        }

        /* Dialogue Box */
        #dialogue-box {
            background: #EFF6FF;
            color: #1E3A8A;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            min-height: 24px;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        /* Scoreboard */
        #scoreboard { 
            background: var(--surface); 
            padding: 16px; 
            border-radius: 16px; 
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        #scoreboard h3 { margin: 0 0 12px 0; font-size: 1.1rem; }
        #player-list { list-style: none; padding: 0; margin: 0; }
        #player-list li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 8px 0; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 0.95rem;
            font-weight: 500;
        }
        #player-list li:last-child { border-bottom: none; padding-bottom: 0; }
        .score-pill {
            background: var(--text-main);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* Guess Section */
        #guess-section {
            display: none;
            background: #FFF1F2;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #FECDD3;
        }
        #guess-section h3 { color: var(--accent-hover); margin-bottom: 15px; font-size: 1.1rem;}
        .guess-btn { background: var(--text-main); margin: 4px; padding: 8px 12px;}
        .guess-btn:hover { background: black; }

        /* Chat Box */
        #chat-box {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            height: 180px;
            overflow: hidden;
            flex-shrink: 0;
        }
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg { background: var(--surface); padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%;}
        .chat-msg strong { color: var(--primary); }
        .chat-controls { display: flex; border-top: 1px solid var(--border-color); }
        #chat-input { border: none; border-radius: 0; padding: 12px 16px; }
        #send-chat-btn { border-radius: 0; background: var(--surface); color: var(--primary); padding: 0 20px; }
        #send-chat-btn:hover { background: #E2E8F0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Chor Police</h1>
            <button id="sound-toggle" class="btn-outline" style="padding: 8px 12px; font-size: 0.8rem;">Sound: ON</button>
        </header>

        <div id="lobby-screen" class="screen active">
            <div style="text-align: center; margin-bottom: 24px;">
                <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Welcome</h2>
                <p style="margin: 0;">Enter your name to start playing</p>
            </div>
            
            <input type="text" id="player-name" placeholder="Your Name" maxlength="12" style="margin-bottom: 24px;">

            <div class="card-panel">
                <h3>Create a Room</h3>
                <select id="player-count" style="margin-bottom: 16px;">
                    <option value="4">4 Players (Classic)</option>
                    <option value="6">6 Players (+ DC, Army)</option>
                </select>
                <button id="create-btn" style="width: 100%;">Host Game</button>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <span style="color: var(--text-light); font-size: 0.9rem; font-weight: 500;">OR</span>
            </div>

            <div class="card-panel" style="margin-bottom: 0;">
                <h3>Join a Room</h3>
                <input type="text" id="room-code-input" placeholder="Enter 6-Digit Code" maxlength="6" style="text-transform: uppercase; margin-bottom: 16px; text-align: center; letter-spacing: 2px;">
                <button id="join-btn" class="btn-outline" style="width: 100%;">Join Game</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="room-info">
                <p>Room: <strong id="display-room-code">----</strong> (<span id="display-max-players">4</span>/4)</p>
                <div class="room-actions">
                    <button id="rename-btn" class="btn-outline" style="padding: 6px 12px; font-size: 0.8rem; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">Rename</button>
                    <button id="copy-link-btn" style="background: rgba(255,255,255,0.2); padding: 6px 12px; font-size: 0.8rem;">Copy Link</button>
                    <button id="exit-btn" class="danger" style="padding: 6px 12px; font-size: 0.8rem;">Exit</button>
                </div>
            </div>

            <div id="dialogue-box">Waiting for players to join...</div>
            
            <div id="guess-section"></div>
            
            <div id="card-table"></div>

            <div id="scoreboard">
                <h3>Players</h3>
                <ul id="player-list"></ul>
            </div>

            <div id="chat-box">
                <div id="chat-messages"></div>
                <div class="chat-controls">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button id="send-chat-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWT6w0EsRYm_Cd2P6JmeQlQjZpNK07V0Y",
            authDomain: "chorpolicegame-8c330.firebaseapp.com",
            databaseURL: "https://chorpolicegame-8c330-default-rtdb.firebaseio.com",
            projectId: "chorpolicegame-8c330",
            storageBucket: "chorpolicegame-8c330.firebasestorage.app",
            messagingSenderId: "70710319190",
            appId: "1:70710319190:web:ef3d024730bacf241543f7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Game Variables ---
        let playerName = "";
        let playerId = "player_" + Math.random().toString(36).substr(2, 9);
        let roomCode = "";
        let roomMaxPlayers = 4;
        let isHost = false;
        let myRole = null;
        let playersData = {};
        let soundEnabled = true;
        let hasTriggeredDialogue = false;
        
        let currentRound = 1;
        const MAX_ROUNDS = 20;

        // Exact Roles & Points requested
        const roles4 = [
            { name: "OC", points: 2000 }, { name: "Daroga", points: 1200 },
            { name: "Police", points: 500 }, { name: "Chor", points: 0 }
        ];
        const roles6 = [
            { name: "DC", points: 2500 }, { name: "OC", points: 2000 },
            { name: "Army", points: 1500 }, { name: "Daroga", points: 1200 },
            { name: "Police", points: 500 }, { name: "Chor", points: 0 }
        ];

        // --- Check URL for Invite Code ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoom = urlParams.get('room');
        if (urlRoom) {
            document.getElementById('room-code-input').value = urlRoom.toUpperCase();
        }

        // --- Audio & Rename ---
        document.getElementById('sound-toggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.innerText = soundEnabled ? "Sound: ON" : "Sound: OFF";
        });

        document.getElementById('rename-btn').addEventListener('click', () => {
            let newName = prompt("Enter your new name:", playerName);
            if (newName && newName.trim() !== "") {
                playerName = newName.trim();
                db.ref(`rooms/${roomCode}/players/${playerId}/name`).set(playerName);
                
                db.ref(`rooms/${roomCode}/chat`).push({
                    sender: "System",
                    text: `A player is now known as ${playerName}`
                });
            }
        });

        // --- Lobby Logic ---
        document.getElementById('create-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) return alert("Please enter your name!");
            
            playerName = nameInput;
            roomMaxPlayers = parseInt(document.getElementById('player-count').value);
            roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            db.ref(`rooms/${roomCode}/info`).set({ maxPlayers: roomMaxPlayers, status: "lobby" });
            db.ref(`rooms/${roomCode}/gameState`).set({ round: 1, status: "lobby" });
            enterGameScreen();
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('player-name').value.trim();
            const codeInput = document.getElementById('room-code-input').value.trim().toUpperCase();
            
            if (!nameInput) return alert("Please enter your name!");
            if (codeInput.length !== 6) return alert("Enter a valid 6-digit code.");
            
            db.ref(`rooms/${codeInput}/info`).once('value', snap => {
                if (snap.exists()) {
                    playerName = nameInput;
                    roomCode = codeInput;
                    roomMaxPlayers = snap.val().maxPlayers;
                    enterGameScreen();
                } else {
                    alert("Room not found! Check the code.");
                }
            });
        });

        function enterGameScreen() {
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            document.getElementById('display-room-code').innerText = roomCode;
            document.getElementById('display-max-players').innerText = roomMaxPlayers;
            
            if(roomMaxPlayers === 6) document.getElementById('card-table').classList.add('six-players');
            
            window.history.replaceState(null, '', `?room=${roomCode}`);
            
            // Fix Chat History Bug: Clear chat visually before joining
            document.getElementById('chat-messages').innerHTML = ""; 
            
            joinRoomFirebase();
        }

        // --- Multiplayer Logic ---
        function joinRoomFirebase() {
            const playerRef = db.ref(`rooms/${roomCode}/players/${playerId}`);
            playerRef.set({ name: playerName, score: 0 });
            playerRef.onDisconnect().remove();

            listenToRoomData();
            setupChatListener();
        }

        function listenToRoomData() {
            db.ref(`rooms/${roomCode}/players`).on('value', snap => {
                playersData = snap.val() || {};
                const playerIds = Object.keys(playersData);
                const list = document.getElementById('player-list');
                list.innerHTML = ""; 
                
                playerIds.forEach(id => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${playersData[id].name}</span> <span class="score-pill">${playersData[id].score} pts</span>`;
                    list.appendChild(li);
                });

                isHost = (playerIds.length > 0 && playerIds[0] === playerId);

                if (playerIds.length === roomMaxPlayers && isHost) {
                    db.ref(`rooms/${roomCode}/gameState`).once('value', gSnap => {
                        const state = gSnap.val();
                        if (state && state.status !== 'playing' && state.status !== 'ended') {
                            hostDealsCards();
                        }
                    });
                }
            });

            db.ref(`rooms/${roomCode}/gameState/round`).on('value', snap => {
                if(snap.val()) currentRound = snap.val();
            });

            db.ref(`rooms/${roomCode}/cards`).on('value', snap => {
                if (snap.val()) renderCards(snap.val());
            });

            db.ref(`rooms/${roomCode}/dialogue`).on('value', snap => {
                if (snap.val()) document.getElementById('dialogue-box').innerHTML = snap.val();
            });
        }

        function hostDealsCards() {
            hasTriggeredDialogue = false; 
            const activeRoles = roomMaxPlayers === 6 ? roles6 : roles4;
            const shuffledRoles = [...activeRoles].sort(() => Math.random() - 0.5);
            const cardData = {};
            
            for(let i = 0; i < roomMaxPlayers; i++) {
                cardData[i] = { role: shuffledRoles[i].name, points: shuffledRoles[i].points, owner: null };
            }
            
            db.ref(`rooms/${roomCode}/cards`).set(cardData);
            db.ref(`rooms/${roomCode}/gameState`).update({ status: 'playing' });
            db.ref(`rooms/${roomCode}/dialogue`).set(`<strong>Round ${currentRound}/${MAX_ROUNDS}</strong><br/>Pick a card quickly!`);
        }

        function renderCards(cards) {
            const table = document.getElementById('card-table');
            table.innerHTML = "";
            let claimedCount = 0;
            let iClaimed = false;
            
            let darogaName = "Daroga";
            let policeName = "Police";

            Object.values(cards).forEach(c => { if (c.owner === playerId) iClaimed = true; });

            Object.keys(cards).forEach(key => {
                const cardObj = cards[key];
                const cardEl = document.createElement('div');
                cardEl.className = 'card';

                if (cardObj.owner) {
                    claimedCount++;
                    cardEl.classList.add('flipped');
                    cardEl.style.transform = "rotateY(180deg)";
                    
                    const ownerName = playersData[cardObj.owner] ? playersData[cardObj.owner].name : "Player";
                    
                    if (cardObj.role === "Daroga") darogaName = ownerName;
                    if (cardObj.role === "Police") policeName = ownerName;

                    if (cardObj.owner === playerId) {
                        myRole = cardObj.role;
                        cardEl.innerHTML = `<div><span style="font-size: 0.8rem; color: #64748B;">You</span><br/>${cardObj.role}<br/><span style="font-size: 0.9rem; color: #3B82F6;">${cardObj.points}</span></div>`;
                    } else {
                        cardEl.innerHTML = `<span style="font-size: 0.9rem; color: #64748B;">Picked by</span><br/>${ownerName}`;
                    }
                } else {
                    cardEl.innerText = "Select";
                    cardEl.addEventListener('click', () => {
                        if (!iClaimed) db.ref(`rooms/${roomCode}/cards/${key}`).update({ owner: playerId });
                    });
                }
                table.appendChild(cardEl);
            });

            if (claimedCount === roomMaxPlayers && !hasTriggeredDialogue) {
                hasTriggeredDialogue = true;
                if (isHost) triggerCinematicDialogue(darogaName, policeName);
            }
        }

        function triggerCinematicDialogue(daroga, police) {
            const dialogueRef = db.ref(`rooms/${roomCode}/dialogue`);
            dialogueRef.set("Cards revealed! Processing...");
            
            setTimeout(() => {
                dialogueRef.set(`<strong>${daroga} (Daroga):</strong> "Police, police; koun hai??"`);
            }, 2000);

            setTimeout(() => {
                dialogueRef.set(`<strong>${police} (Police):</strong> "Hum hai!"`);
            }, 5000);

            setTimeout(() => {
                dialogueRef.set(`<strong>${daroga} (Daroga):</strong> "Chor ko pakdo!"`);
                db.ref(`rooms/${roomCode}/guessPhase`).set(true); 
            }, 7000);
        }

        // --- Guessing & 20-Round Logic ---
        db.ref(`rooms/${roomCode}/guessPhase`).on('value', snap => {
            if (snap.val() && myRole === "Police") {
                activatePoliceGuessing();
            }
        });

        function activatePoliceGuessing() {
            const guessSec = document.getElementById('guess-section');
            guessSec.innerHTML = "<h3>You are the Police! Who is the Chor?</h3>";
            guessSec.style.display = "block";
            
            // Remove Daroga and Police (oneself) from suspect list
            Object.keys(playersData).forEach(id => {
                let isDaroga = false;
                db.ref(`rooms/${roomCode}/cards`).once('value', snap => {
                    const cards = snap.val();
                    Object.values(cards).forEach(c => { if (c.owner === id && c.role === "Daroga") isDaroga = true; });
                    
                    if (id !== playerId && !isDaroga) {
                        const btn = document.createElement('button');
                        btn.className = "guess-btn";
                        btn.innerText = playersData[id].name;
                        btn.onclick = () => makeGuess(id);
                        guessSec.appendChild(btn);
                    }
                });
            });
        }

        function makeGuess(suspectId) {
            document.getElementById('guess-section').style.display = "none";
            
            db.ref(`rooms/${roomCode}/cards`).once('value', snap => {
                const cards = snap.val();
                let suspectRole = "";
                let chorId = "";
                
                Object.values(cards).forEach(c => {
                    if (c.owner === suspectId) suspectRole = c.role;
                    if (c.role === "Chor") chorId = c.owner;
                });

                if (suspectRole === "Chor") {
                    db.ref(`rooms/${roomCode}/dialogue`).set(`🏆 **${playerName} (Police)** caught the Chor! (+500 pts)`);
                    updateScore(playerId, 500); 
                } else {
                    const realChorName = playersData[chorId] ? playersData[chorId].name : "Unknown";
                    db.ref(`rooms/${roomCode}/dialogue`).set(`❌ Wrong! The Chor was ${realChorName}. Chor escapes! (+500 pts)`);
                    updateScore(chorId, 500); 
                }

                Object.values(cards).forEach(c => {
                    if (c.role !== "Police" && c.role !== "Chor" && c.owner) {
                        updateScore(c.owner, c.points);
                    }
                });
                
                setTimeout(() => {
                    if(isHost) {
                        if (currentRound >= MAX_ROUNDS) {
                            triggerEndGameCelebration();
                        } else {
                            db.ref(`rooms/${roomCode}/gameState/round`).set(currentRound + 1);
                            db.ref(`rooms/${roomCode}/guessPhase`).remove();
                            db.ref(`rooms/${roomCode}/cards`).remove();
                            db.ref(`rooms/${roomCode}/dialogue`).set(`Round over! Preparing Round ${currentRound + 1}...`);
                            setTimeout(hostDealsCards, 3000); 
                        }
                    }
                    myRole = null;
                }, 5000);
            });
        }

        function triggerEndGameCelebration() {
            db.ref(`rooms/${roomCode}/players`).once('value', snap => {
                const finalPlayers = snap.val();
                let sortedPlayers = Object.keys(finalPlayers).map(id => {
                    return { name: finalPlayers[id].name, score: finalPlayers[id].score };
                }).sort((a, b) => b.score - a.score);

                const titles = ["👑 KING", "👸 QUEEN", "🛡️ MINISTER", "💂 SENAPATI", "🏃 CHOR", "🕵️ PRISONER"];
                
                let resultHTML = "<h2 style='margin: 0 0 10px 0; color: #E11D48;'>🎉 GAME OVER 🎉</h2>";
                sortedPlayers.forEach((p, index) => {
                    let title = titles[index] || "CITIZEN";
                    resultHTML += `<p style="margin: 5px 0; font-size: 1.1rem; color: #1E293B;"><strong>${title}:</strong> ${p.name} <span style="color: #3B82F6;">(${p.score} pts)</span></p>`;
                });

                db.ref(`rooms/${roomCode}/dialogue`).set(resultHTML);
                db.ref(`rooms/${roomCode}/gameState/status`).set('ended');
                db.ref(`rooms/${roomCode}/guessPhase`).remove();
            });
        }

        function updateScore(targetPlayerId, pointsToAdd) {
            const scoreRef = db.ref(`rooms/${roomCode}/players/${targetPlayerId}/score`);
            scoreRef.once('value', snap => {
                scoreRef.set((snap.val() || 0) + pointsToAdd);
            });
        }

        // --- Controls (Exit, Link, Chat) ---
        document.getElementById('copy-link-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href);
            alert("Invite link copied to clipboard!");
        });

        document.getElementById('exit-btn').addEventListener('click', () => {
            db.ref(`rooms/${roomCode}/players/${playerId}`).remove();
            window.location.href = window.location.pathname; 
        });

        const chatInput = document.getElementById('chat-input');
        function sendChat() {
            const text = chatInput.value.trim();
            if (text && playerName) {
                db.ref(`rooms/${roomCode}/chat`).push({ sender: playerName, text: text });
                chatInput.value = ""; 
            }
        }
        document.getElementById('send-chat-btn').addEventListener('click', sendChat);
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });

        function setupChatListener() {
            db.ref(`rooms/${roomCode}/chat`).on('child_added', snap => {
                const msg = snap.val();
                const box = document.getElementById('chat-messages');
                let msgClass = msg.sender === "System" ? "style='background: #FFF1F2; color: #E11D48; margin: 5px auto; text-align: center; width: 90%;'" : "";
                box.innerHTML += `<div class="chat-msg" ${msgClass}><strong>${msg.sender}:</strong> ${msg.text}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
