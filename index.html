<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chor Police Multiplayer</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚓</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-body: #0F172A; --bg-app: #FFFFFF; --primary: #3B82F6; --primary-hover: #2563EB;
            --accent: #E11D48; --accent-hover: #BE123C; --text-main: #1E293B; --text-light: #64748B;
            --surface: #F8FAFC; --border-color: #E2E8F0;
            --card-back: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #game-container { background: var(--bg-app); width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        @media (min-width: 500px) { #game-container { height: 95vh; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); } }

        header { background: var(--bg-app); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        
        button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: inherit; }
        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.95); }
        button.danger { background: var(--accent); }
        button.danger:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; color: var(--text-main); border: 2px solid var(--border-color); }

        .screen { display: none; padding: 20px; flex-grow: 1; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; }

        input, select { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid var(--border-color); border-radius: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; }
        .card-panel { background: var(--surface); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border-color); }

        /* Overlays */
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .overlay.active { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }

        /* UI Elements */
        #room-info { display: flex; flex-direction: column; align-items: center; gap: 10px; background: var(--text-main); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        #room-info p { margin: 0; font-weight: 500; }
        #room-info strong { color: #38BDF8; font-size: 1.2rem; }
        
        #host-requests { display: none; background: #FEF3C7; border: 2px solid #F59E0B; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .request-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; background: white; padding: 8px; border-radius: 8px; font-size: 0.9rem;}

        #card-table { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0; perspective: 1000px; }
        #card-table.six-players { grid-template-columns: 1fr 1fr 1fr; }
        .card { background: var(--card-back); height: 100px; border-radius: 12px; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-weight: 600; cursor: pointer; transition: 0.4s; user-select: none; border: 2px solid rgba(255,255,255,0.1);}
        .card.flipped { background: white; color: var(--text-main); border: 2px solid var(--primary); transform: rotateY(180deg); }
        
        #dialogue-box { background: #EFF6FF; color: #1E3A8A; padding: 15px; border-radius: 12px; text-align: center; font-weight: 500; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        #guess-section { display: none; background: #FFF1F2; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #FECDD3; margin-bottom: 15px; }
        
        #player-list { list-style: none; padding: 0; margin: 0; background: var(--surface); padding: 10px; border-radius: 12px; margin-bottom: 15px;}
        #player-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .score-pill { background: var(--text-main); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; }

        #chat-box { background: white; border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; height: 150px; flex-shrink: 0;}
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
        .chat-msg { background: var(--surface); padding: 6px 10px; border-radius: 8px; align-self: flex-start; max-width: 85%;}
        .chat-controls { display: flex; border-top: 1px solid var(--border-color); }
        #chat-input { border: none; border-radius: 0; padding: 10px; margin: 0;}
        #send-chat-btn { border-radius: 0; padding: 0 15px; }
    </style>
</head>
<body>
    <div id="game-container">
        
        <div id="auth-overlay" class="overlay active">
            <div class="modal-box">
                <h2 style="margin-top:0;">🚓 Chor Police</h2>
                <p style="color: var(--text-light); margin-bottom: 20px; font-size: 0.9rem;">Sign in to save your Kings & Queens titles!</p>
                <button id="google-login-btn" style="width: 100%; background: white; color: #333; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
                    Google Login
                </button>
                <div style="margin-bottom: 15px; color: var(--text-light);">OR</div>
                <input type="text" id="guest-name-input" placeholder="Enter Guest Name" maxlength="12" style="text-align: center;">
                <button id="guest-login-btn" class="btn-outline" style="width: 100%;">Play as Guest</button>
            </div>
        </div>

        <div id="waiting-overlay" class="overlay">
            <div class="modal-box">
                <h3>Request Sent!</h3>
                <p>Waiting for the Host to approve...</p>
                <button onclick="cancelJoinRequest()" class="danger" style="margin-top: 15px;">Cancel</button>
            </div>
        </div>

        <div id="profile-overlay" class="overlay">
            <div class="modal-box">
                <h2 id="profile-name" style="margin: 0 0 15px 0;">Player</h2>
                <div style="background: var(--surface); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left;">🏆 <strong>Total Wins:</strong> <span id="stat-wins">0</span></div>
                <div style="background: var(--surface); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: left;">⭐ <strong>Lifetime Score:</strong> <span id="stat-score">0</span></div>
                
                <button id="logout-btn" class="danger" style="width: 100%; margin-bottom: 10px;">Logout</button>
                <button class="btn-outline" onclick="document.getElementById('profile-overlay').classList.remove('active')" style="width: 100%;">Close</button>
            </div>
        </div>

        <header>
            <button id="profile-btn" class="btn-outline" style="padding: 6px 12px; font-size: 0.8rem;">👤 Profile</button>
            <button id="sound-toggle" class="btn-outline" style="padding: 6px 12px; font-size: 0.8rem;">🔊 Sound: ON</button>
        </header>

        <div id="lobby-screen" class="screen">
            <h2 style="text-align: center; margin-top: 0;">Game Lobby</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="player-name" placeholder="Your Name" maxlength="12" style="margin: 0;">
                <button id="rename-btn" style="white-space: nowrap;">Update Name</button>
            </div>

            <div class="card-panel">
                <h3 style="margin-top:0;">Host a Game</h3>
                <select id="player-count">
                    <option value="4">4 Players (Classic)</option>
                    <option value="6">6 Players (+ DC, Army)</option>
                </select>
                <button id="create-btn" style="width: 100%;">Create Room</button>
            </div>

            <div class="card-panel" style="margin-bottom: 0;">
                <h3 style="margin-top:0;">Join a Game</h3>
                <input type="text" id="room-code-input" placeholder="6-Digit Code" maxlength="6" style="text-transform: uppercase; text-align: center; letter-spacing: 2px;">
                <button id="join-btn" class="btn-outline" style="width: 100%;">Request to Join</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="room-info">
                <p>Room Code: <strong id="display-room-code">----</strong> (<span id="display-max-players">4</span>/4)</p>
                <div style="display: flex; gap: 10px;">
                    <button id="copy-link-btn" style="background: rgba(255,255,255,0.2); padding: 6px 12px; font-size: 0.8rem;">Copy Link</button>
                    <button id="exit-btn" class="danger" style="padding: 6px 12px; font-size: 0.8rem;">Leave Room</button>
                </div>
            </div>

            <div id="host-requests">
                <h4 style="margin: 0 0 10px 0;">🔔 Join Requests</h4>
                <div id="request-list"></div>
            </div>

            <div id="dialogue-box">Waiting for players...</div>
            <div id="guess-section"></div>
            <div id="card-table"></div>

            <h3 style="margin: 0 0 10px 0;">Scoreboard</h3>
            <ul id="player-list"></ul>

            <div id="chat-box">
                <div id="chat-messages"></div>
                <div class="chat-controls">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button id="send-chat-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config (With your exact Asia-Southeast region URL) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWT6w0EsRYm_Cd2P6JmeQlQjZpNK07V0Y",
            authDomain: "chorpolicegame-8c330.firebaseapp.com",
            databaseURL: "https://chorpolicegame-8c330-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chorpolicegame-8c330",
            storageBucket: "chorpolicegame-8c330.firebasestorage.app",
            messagingSenderId: "70710319190",
            appId: "1:70710319190:web:ef3d024730bacf241543f7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- Core Variables ---
        let playerName = localStorage.getItem('cp_playerName') || "";
        let playerId = localStorage.getItem('cp_playerId') || "user_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('cp_playerId', playerId);

        let roomCode = "";
        let roomMaxPlayers = 4;
        let isHost = false;
        let myRole = null;
        let playersData = {};
        let currentRound = 1;
        let soundEnabled = true;

        const roles4 = [{name:"OC",pts:2000},{name:"Daroga",pts:1200},{name:"Police",pts:500},{name:"Chor",pts:0}];
        const roles6 = [{name:"DC",pts:2500},{name:"OC",pts:2000},{name:"Army",pts:1500},{name:"Daroga",pts:1200},{name:"Police",pts:500},{name:"Chor",pts:0}];

        // --- Sound Synthesizer ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(!soundEnabled) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let now = audioCtx.currentTime;
            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'flip') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            }
        }
        document.addEventListener('click', (e) => { if (e.target.tagName === 'BUTTON') playSound('click'); });
        document.getElementById('sound-toggle').onclick = function() {
            soundEnabled = !soundEnabled; this.innerText = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF";
        };

        // --- Auth & Profile Logic ---
        auth.onAuthStateChanged(user => {
            if (user) {
                playerId = user.uid;
                playerName = user.displayName || "Player";
                db.ref(`users/${playerId}/profile`).update({ name: playerName });
                finishAuth();
            } else if (playerName) {
                // If they already chose a guest name previously
                finishAuth();
            }
        });

        document.getElementById('google-login-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Google Login Failed. Check Firebase Console."));
        };

        document.getElementById('guest-login-btn').onclick = () => {
            const guestInput = document.getElementById('guest-name-input').value.trim();
            playerName = guestInput || "Guest_" + Math.floor(Math.random()*1000);
            localStorage.setItem('cp_playerName', playerName);
            finishAuth();
        };

        document.getElementById('logout-btn').onclick = () => {
            auth.signOut().then(() => {
                localStorage.removeItem('cp_playerName');
                window.location.reload();
            });
        };

        function finishAuth() {
            document.getElementById('auth-overlay').classList.remove('active');
            document.getElementById('lobby-screen').classList.add('active');
            document.getElementById('player-name').value = playerName;
        }

        document.getElementById('profile-btn').onclick = () => {
            document.getElementById('profile-name').innerText = playerName;
            db.ref(`users/${playerId}/stats`).once('value', snap => {
                const stats = snap.val() || { wins: 0, lifetimeScore: 0 };
                document.getElementById('stat-wins').innerText = stats.wins;
                document.getElementById('stat-score').innerText = stats.lifetimeScore;
            });
            document.getElementById('profile-overlay').classList.add('active');
        };

        document.getElementById('rename-btn').onclick = () => {
            const newName = document.getElementById('player-name').value.trim();
            if (newName) {
                playerName = newName;
                localStorage.setItem('cp_playerName', playerName);
                if (roomCode) db.ref(`rooms/${roomCode}/players/${playerId}/name`).set(playerName);
                alert("Name updated successfully!");
            }
        };

        // --- Create / Join Room ---
        document.getElementById('create-btn').onclick = () => {
            if (!playerName) return alert("Please set your name!");
            roomMaxPlayers = parseInt(document.getElementById('player-count').value);
            roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            db.ref(`rooms/${roomCode}/info`).set({ maxPlayers: roomMaxPlayers, hostId: playerId });
            db.ref(`rooms/${roomCode}/gameState`).set({ round: 1, status: 'lobby' });
            
            db.ref(`rooms/${roomCode}/players/${playerId}`).set({ name: playerName, score: 0 });
            enterGameScreen();
        };

        document.getElementById('join-btn').onclick = () => {
            if (!playerName) return alert("Please set your name!");
            const codeInput = document.getElementById('room-code-input').value.trim().toUpperCase();
            if (codeInput.length !== 6) return alert("Enter a valid 6-digit code.");
            
            db.ref(`rooms/${codeInput}/info`).once('value', snap => {
                if (!snap.exists()) return alert("Room not found!");
                roomCode = codeInput;
                roomMaxPlayers = snap.val().maxPlayers;
                
                // Send Request
                db.ref(`rooms/${roomCode}/requests/${playerId}`).set({ name: playerName, uid: playerId });
                document.getElementById('waiting-overlay').classList.add('active');
                
                // Listen for approval
                db.ref(`rooms/${roomCode}/players/${playerId}`).on('value', pSnap => {
                    if (pSnap.exists()) {
                        document.getElementById('waiting-overlay').classList.remove('active');
                        db.ref(`rooms/${roomCode}/players/${playerId}`).off(); 
                        enterGameScreen();
                    }
                });
            });
        };

        function cancelJoinRequest() {
            db.ref(`rooms/${roomCode}/requests/${playerId}`).remove();
            document.getElementById('waiting-overlay').classList.remove('active');
        }

        function enterGameScreen() {
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-room-code').innerText = roomCode;
            document.getElementById('display-max-players').innerText = roomMaxPlayers;
            if(roomMaxPlayers === 6) document.getElementById('card-table').classList.add('six-players');
            window.history.replaceState(null, '', `?room=${roomCode}`);
            
            document.getElementById('chat-messages').innerHTML = ""; // Clear old chat
            db.ref(`rooms/${roomCode}/players/${playerId}`).onDisconnect().remove();
            listenToRoomData();
            setupChatListener();
        }

        // --- Room Listening & Host Requests ---
        function listenToRoomData() {
            db.ref(`rooms/${roomCode}/info/hostId`).on('value', snap => {
                isHost = (snap.val() === playerId);
                if(isHost) monitorJoinRequests(); 
            });

            db.ref(`rooms/${roomCode}/players`).on('value', snap => {
                playersData = snap.val() || {};
                const playerIds = Object.keys(playersData);
                const list = document.getElementById('player-list');
                list.innerHTML = ""; 
                
                playerIds.forEach(id => {
                    list.innerHTML += `<li><span>${playersData[id].name} ${id===playerId ? "(You)" : ""}</span> <span class="score-pill">${playersData[id].score}</span></li>`;
                });

                if (playerIds.length === roomMaxPlayers && isHost) {
                    db.ref(`rooms/${roomCode}/gameState`).once('value', gSnap => {
                        if (gSnap.val() && gSnap.val().status === 'lobby') hostDealsCards();
                    });
                }
            });

            db.ref(`rooms/${roomCode}/gameState/round`).on('value', snap => { if (snap.val()) currentRound = snap.val(); });
            db.ref(`rooms/${roomCode}/cards`).on('value', snap => { if (snap.val()) renderCards(snap.val()); });
            db.ref(`rooms/${roomCode}/dialogue`).on('value', snap => { if (snap.val()) document.getElementById('dialogue-box').innerHTML = snap.val(); });
        }

        function monitorJoinRequests() {
            const reqDiv = document.getElementById('host-requests');
            const reqList = document.getElementById('request-list');
            
            db.ref(`rooms/${roomCode}/requests`).on('value', snap => {
                const reqs = snap.val() || {};
                reqList.innerHTML = "";
                if(Object.keys(reqs).length > 0) {
                    reqDiv.style.display = "block";
                    Object.values(reqs).forEach(req => {
                        reqList.innerHTML += `
                            <div class="request-item">
                                <span><strong>${req.name}</strong> wants to join</span>
                                <div>
                                    <button onclick="approvePlayer('${req.uid}', '${req.name}')" style="background:#10B981; padding:4px 8px;">Accept</button>
                                    <button onclick="rejectPlayer('${req.uid}')" class="danger" style="padding:4px 8px;">Reject</button>
                                </div>
                            </div>`;
                    });
                } else {
                    reqDiv.style.display = "none";
                }
            });
        }

        window.approvePlayer = function(uid, name) {
            db.ref(`rooms/${roomCode}/players`).once('value', snap => {
                let count = snap.val() ? Object.keys(snap.val()).length : 0;
                if (count >= roomMaxPlayers) return alert("Room is full!");
                db.ref(`rooms/${roomCode}/players/${uid}`).set({ name: name, score: 0 });
                db.ref(`rooms/${roomCode}/requests/${uid}`).remove();
            });
        };
        window.rejectPlayer = function(uid) { db.ref(`rooms/${roomCode}/requests/${uid}`).remove(); };

        // --- Core Gameplay ---
        function hostDealsCards() {
            const activeRoles = roomMaxPlayers === 6 ? roles6 : roles4;
            const shuffled = [...activeRoles].sort(() => Math.random() - 0.5);
            const cardData = {};
            for(let i=0; i<roomMaxPlayers; i++) cardData[i] = { role: shuffled[i].name, points: shuffled[i].pts, owner: null };
            
            db.ref(`rooms/${roomCode}/cards`).set(cardData);
            db.ref(`rooms/${roomCode}/gameState`).update({ status: 'playing' });
            db.ref(`rooms/${roomCode}/dialogue`).set(`<strong>Round ${currentRound}/20</strong><br/>Game Started! Pick a card!`);
        }

        function renderCards(cards) {
            const table = document.getElementById('card-table');
            table.innerHTML = "";
            let claimedCount = 0; let iClaimed = false;
            let darogaName = "Daroga"; let policeName = "Police";

            Object.values(cards).forEach(c => { if (c.owner === playerId) iClaimed = true; });

            Object.keys(cards).forEach(key => {
                const cardObj = cards[key];
                const cardEl = document.createElement('div'); cardEl.className = 'card';

                if (cardObj.owner) {
                    claimedCount++; cardEl.classList.add('flipped');
                    const ownerName = playersData[cardObj.owner] ? playersData[cardObj.owner].name : "Player";
                    
                    if (cardObj.role === "Daroga") darogaName = ownerName;
                    if (cardObj.role === "Police") policeName = ownerName;

                    if (cardObj.owner === playerId) {
                        myRole = cardObj.role;
                        cardEl.innerHTML = `<div style="color:var(--text-main)"><span style="font-size:0.8rem">You</span><br/>${cardObj.role}<br/><span style="color:var(--primary)">${cardObj.points}</span></div>`;
                    } else {
                        cardEl.innerHTML = `<span style="font-size:0.9rem; color:var(--text-light)">Picked by<br/>${ownerName}</span>`;
                    }
                } else {
                    cardEl.innerText = "Select";
                    cardEl.onclick = () => {
                        if (!iClaimed) { playSound('flip'); db.ref(`rooms/${roomCode}/cards/${key}`).update({ owner: playerId }); }
                    };
                }
                table.appendChild(cardEl);
            });

            if (claimedCount === roomMaxPlayers && isHost) {
                db.ref(`rooms/${roomCode}/guessPhase`).once('value', snap => {
                    if(!snap.exists()) triggerCinematicDialogue(darogaName, policeName);
                });
            }
        }

        // EXACT DIALOGUE TIMINGS
        function triggerCinematicDialogue(daroga, police) {
            db.ref(`rooms/${roomCode}/guessPhase`).set(false); 
            const dRef = db.ref(`rooms/${roomCode}/dialogue`);
            dRef.set("Cards revealed. Waiting...");
            
            // Wait 5 seconds
            setTimeout(() => {
                dRef.set(`<strong>${daroga} (Daroga):</strong> "Police, police; koun hai??"`);
            }, 5000);
            
            // Wait 3 seconds
            setTimeout(() => {
                dRef.set(`<strong>${police} (Police):</strong> "Hum hai!"`);
                
                // Immediately after Hum Hai
                setTimeout(() => {
                    dRef.set(`<strong>${daroga} (Daroga):</strong> "Chor ko pakdo!"`);
                    db.ref(`rooms/${roomCode}/guessPhase`).set(true); 
                }, 500); 
            }, 8000); 
        }

        db.ref(`rooms/${roomCode}/guessPhase`).on('value', snap => {
            if (snap.val() === true && myRole === "Police") activatePoliceGuessing();
        });

        function activatePoliceGuessing() {
            const guessSec = document.getElementById('guess-section');
            guessSec.innerHTML = "<h3 style='margin:0 0 10px 0; color:var(--accent)'>You are Police! Who is Chor?</h3>";
            guessSec.style.display = "block";
            
            db.ref(`rooms/${roomCode}/cards`).once('value', snap => {
                const cards = Object.values(snap.val());
                Object.keys(playersData).forEach(id => {
                    const isDaroga = cards.some(c => c.owner === id && c.role === "Daroga");
                    if (id !== playerId && !isDaroga) {
                        const btn = document.createElement('button');
                        btn.className = "guess-btn"; btn.innerText = playersData[id].name;
                        btn.onclick = () => makeGuess(id);
                        guessSec.appendChild(btn);
                    }
                });
            });
        }

        function makeGuess(suspectId) {
            document.getElementById('guess-section').style.display = "none";
            
            db.ref(`rooms/${roomCode}/cards`).once('value', snap => {
                const cards = Object.values(snap.val());
                let suspectRole = cards.find(c => c.owner === suspectId)?.role;
                let chorId = cards.find(c => c.role === "Chor")?.owner;

                if (suspectRole === "Chor") {
                    db.ref(`rooms/${roomCode}/dialogue`).set(`🏆 **${playerName}** caught the Chor! (+500)`);
                    updateScore(playerId, 500); 
                } else {
                    db.ref(`rooms/${roomCode}/dialogue`).set(`❌ Wrong! The Chor escaped! (+500 to Chor)`);
                    updateScore(chorId, 500); 
                }

                cards.forEach(c => { if (c.role !== "Police" && c.role !== "Chor" && c.owner) updateScore(c.owner, c.points); });
                
                setTimeout(() => {
                    if(isHost) {
                        if (currentRound >= 20) triggerEndGame();
                        else {
                            db.ref(`rooms/${roomCode}/gameState/round`).set(currentRound + 1);
                            db.ref(`rooms/${roomCode}/guessPhase`).remove();
                            db.ref(`rooms/${roomCode}/cards`).remove();
                            setTimeout(hostDealsCards, 2000); 
                        }
                    }
                    myRole = null;
                }, 4000);
            });
        }

        function triggerEndGame() {
            db.ref(`rooms/${roomCode}/players`).once('value', snap => {
                const p = snap.val();
                let sorted = Object.keys(p).map(id => ({ id, name: p[id].name, score: p[id].score })).sort((a,b)=>b.score-a.score);
                const titles = ["👑 KING", "👸 QUEEN", "🛡️ MINISTER", "💂 SENAPATI", "🏃 CHOR", "🕵️ PRISONER"];
                
                let html = "<h2 style='color:#E11D48; margin:0'>🎉 GAME OVER 🎉</h2>";
                sorted.forEach((player, i) => { html += `<p style="margin:4px"><strong>${titles[i]||"CITIZEN"}</strong>: ${player.name} (${player.score})</p>`; });
                
                const winnerId = sorted[0].id;
                db.ref(`users/${winnerId}/stats/wins`).once('value', s => db.ref(`users/${winnerId}/stats/wins`).set((s.val()||0)+1));
                sorted.forEach(player => { db.ref(`users/${player.id}/stats/lifetimeScore`).once('value', s => db.ref(`users/${player.id}/stats/lifetimeScore`).set((s.val()||0)+player.score)); });

                db.ref(`rooms/${roomCode}/dialogue`).set(html);
                db.ref(`rooms/${roomCode}/gameState/status`).set('ended');
            });
        }

        function updateScore(id, pts) { db.ref(`rooms/${roomCode}/players/${id}/score`).once('value', s => db.ref(`rooms/${roomCode}/players/${id}/score`).set((s.val()||0)+pts)); }
        
        document.getElementById('copy-link-btn').onclick = () => { navigator.clipboard.writeText(window.location.href); alert("Link copied!"); }
        document.getElementById('exit-btn').onclick = () => { db.ref(`rooms/${roomCode}/players/${playerId}`).remove(); window.location.href = window.location.pathname; }

        const chatInput = document.getElementById('chat-input');
        function sendChat() {
            const text = chatInput.value.trim();
            if (text && playerName) { db.ref(`rooms/${roomCode}/chat`).push({ sender: playerName, text: text }); chatInput.value = ""; }
        }
        document.getElementById('send-chat-btn').onclick = sendChat;
        chatInput.onkeypress = e => { if (e.key === 'Enter') sendChat(); };

        function setupChatListener() {
            db.ref(`rooms/${roomCode}/chat`).on('child_added', snap => {
                const msg = snap.val(); const box = document.getElementById('chat-messages');
                let mClass = msg.sender === "System" ? "style='background: #FFF1F2; color: #E11D48; margin: 5px auto; text-align: center; width: 90%;'" : "";
                box.innerHTML += `<div class="chat-msg" ${mClass}><strong>${msg.sender}:</strong> ${msg.text}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
